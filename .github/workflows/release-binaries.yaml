name: Release Binaries
on:
  push:
    tags:
      - v*
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - run: scripts/build-sea.sh --all
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-bin/*
